body:
  text: 十一子曰大臣之不親也則忠敬不足而富貴已過也邦家之不寧也則大臣不治而褻臣託也此以大臣不可不敬民之蕝也故君不與小謀大則大臣不怨祭公之顧命云毋以小謀敗大作毋以嬖御塞莊后毋以卑嬖塞大夫
